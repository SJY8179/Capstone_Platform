# application-local.properties

# 서버 포트(원하는 포트로 변경 가능)
server.port=8080

# MariaDB 연결
spring.datasource.url=jdbc:mariadb://localhost:3306/capstone
spring.datasource.username=capstone
spring.datasource.password=capstone
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA - Flyway를 사용하므로 Hibernate DDL 비활성화
spring.jpa.hibernate.ddl-auto=none

# Flyway 설정
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=2

# 첫 실행만 create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.security.user.name=dev
spring.security.user.password=devpw

# 세션 쿠키 플래그 설정 (로컬 개발 환경)
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
# 개발용 http라면 secure=false (운영/HTTPS에서만 true 권장)
server.servlet.session.cookie.secure=false

# CORS 설정
app.client.origin=http://localhost:5173
