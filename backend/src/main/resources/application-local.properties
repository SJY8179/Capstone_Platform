# application-local.properties

# 서버 포트(원하는 포트로 변경 가능)
server.port=8080

# MariaDB 연결
spring.datasource.url=jdbc:mariadb://localhost:3306/capstone
spring.datasource.username=capstone
spring.datasource.password=capstone
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA - Flyway를 사용하므로 Hibernate DDL 비활성화
spring.jpa.hibernate.ddl-auto=none

# Flyway 설정
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=2

# 첫 실행만 create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.security.user.name=dev
spring.security.user.password=devpw
